task: swe

model:
  model_name_or_path: Qwen/Qwen2.5-1.5B-Instruct
  dtype: bf16
  trust_remote_code: true

grpo:
  n_samples_per_prompt: 4
  kl_coef: 0.01
  clip_range: 0.2
  max_grad_norm: 1.0

rollout:
  rollout_batch_size: 4
  max_new_tokens: 1024
  temperature: 0.7
  top_p: 0.95

training:
  lr: 5.0e-7
  weight_decay: 0.01
  warmup_ratio: 0.03
  train_batch_size: 4
  micro_batch_size: 1
  num_epochs: 1
  max_steps: 200
  save_steps: 50
  logging_steps: 1
  gradient_checkpointing: true
  num_ppo_epochs: 1
  seed: 42

swe:
  max_turns: 10
  docker_image_prefix: swebench
  sandbox_timeout: 300
  max_concurrent_sandboxes: 4
  sandbox_memory_limit: 4g
  sandbox_cpu_limit: 2.0

data:
  prompt_dataset: princeton-nlp/SWE-bench_Lite
  prompt_dataset_split: test
  input_key: problem_statement
  label_key: instance_id
  max_samples: 50

infra:
  num_gpus: 2
  vllm_num_engines: 1
  vllm_gpu_memory_utilization: 0.85
  vllm_enforce_eager: true
  vllm_enable_sleep: true
  vllm_tensor_parallel_size: 1
  deepspeed_stage: 2

logging:
  use_wandb: true
  wandb_project: leanrl-swe
  output_dir: ./output/swe_grpo_1.5b
