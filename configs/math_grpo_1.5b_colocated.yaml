task: math

model:
  model_name_or_path: Qwen/Qwen2.5-1.5B-Instruct
  dtype: bf16
  trust_remote_code: true

grpo:
  n_samples_per_prompt: 8
  kl_coef: 0.02
  clip_range: 0.2
  max_grad_norm: 1.0

rollout:
  rollout_batch_size: 64
  max_new_tokens: 512
  temperature: 0.7
  top_p: 0.95

training:
  lr: 1.0e-6
  weight_decay: 0.01
  warmup_ratio: 0.03
  train_batch_size: 32
  micro_batch_size: 4
  num_epochs: 1
  save_steps: 50
  logging_steps: 1
  gradient_checkpointing: true
  num_ppo_epochs: 1
  save_best_only: true
  seed: 42

data:
  prompt_dataset: openai/gsm8k
  prompt_dataset_split: train
  input_key: question
  label_key: answer
  max_samples: -1
  max_samples_to_eval: 32

infra:
  vllm_num_engines: 1
  vllm_gpu_memory_utilization: 0.90
  vllm_enforce_eager: false
  vllm_enable_sleep: true
  vllm_tensor_parallel_size: 2
  deepspeed_stage: 3
  offload_optimizer: true
  offload_param: true
  ray_address: "auto"

logging:
  use_wandb: true
  wandb_project: leanrl-math
  output_dir: ./output/math_grpo_1.5b_colocated
